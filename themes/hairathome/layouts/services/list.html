{{ define "main" }}
<div class="max-w-7xl mx-auto px-6 py-12">
    <section class="text-center mb-16">
        <h1 class="text-3xl md:text-4xl font-medium tracking-tight text-zinc-900 dark:text-white mb-4">{{ .Title }}</h1>
        <p class="text-lg text-zinc-700 dark:text-zinc-700 max-w-2xl mx-auto">Professional hair services tailored to your needs</p>
    </section>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {{ range .Pages }}
        <div class="bg-brand-cream dark:bg-zinc-900 rounded-2xl shadow-lg shadow-zinc-200/50 dark:shadow-zinc-900/50 border border-brand-copper/10 dark:border-zinc-600 overflow-hidden hover:shadow-xl transition-shadow duration-300 group">
            {{ $serviceImage := printf "images/stock/service-%s-square_00001_.png" .Slug }}
            <div class="aspect-square overflow-hidden">
                <img src="{{ $serviceImage }}"
                     alt="{{ .Title }} professional service"
                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
            </div>
            <div class="p-6">
                <h3 class="text-xl font-medium text-zinc-900 dark:text-white mb-3">{{ .Title }}</h3>
                <p class="text-zinc-700 dark:text-zinc-700 mb-4 line-clamp-2">{{ .Params.description }}</p>
                <div class="text-lg font-medium text-zinc-900 dark:text-white mb-6">{{ .Params.price }}</div>
                <a href="{{ .RelPermalink }}" class="inline-block w-full text-center bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 rounded-lg px-6 py-3 hover:bg-zinc-800 dark:hover:bg-zinc-200 transition-colors font-medium">View Service Details</a>
            </div>
        </div>
        {{ end }}
    </div>
</div>
{{ end }}
